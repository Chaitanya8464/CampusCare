<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2563EB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1E40AF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grad2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#60A5FA;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#3B82F6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad1)"/>
  
  <!-- Campus Building Base -->
  <rect x="25" y="45" width="50" height="35" rx="3" fill="white" opacity="0.95"/>
  
  <!-- Building Windows Left -->
  <rect x="30" y="52" width="8" height="10" rx="1" fill="url(#grad2)"/>
  <rect x="42" y="52" width="8" height="10" rx="1" fill="url(#grad2)"/>
  
  <!-- Building Windows Right -->
  <rect x="54" y="52" width="8" height="10" rx="1" fill="url(#grad2)"/>
  <rect x="66" y="52" width="8" height="10" rx="1" fill="url(#grad2)"/>
  
  <!-- Building Door -->
  <rect x="43" y="66" width="14" height="14" rx="2" fill="url(#grad1)"/>
  
  <!-- Roof/Triangle -->
  <polygon points="50,18 20,45 80,45" fill="white" opacity="0.95"/>
  
  <!-- Care Heart Symbol on Roof -->
  <path d="M50 28 C50 28 48 26 46 26 C44 26 43 27 43 29 C43 32 50 35 50 35 C50 35 57 32 57 29 C57 27 56 26 54 26 C52 26 50 28 50 28" 
        fill="url(#grad1)" stroke="#2563EB" stroke-width="0.5"/>
  
  <!-- Small decorative circles -->
  <circle cx="50" cy="12" r="3" fill="white" opacity="0.8"/>
</svg>
